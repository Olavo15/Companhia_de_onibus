version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: .docker/php-fpm/Dockerfile
      args:
        APP_ENV: ${APP_ENV}
    container_name: company-php
    restart: unless-stopped
    volumes:
      - ./:/app
    environment:
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - company-onibus
    command: php-fpm

  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    container_name: company-nginx
    restart: unless-stopped
    volumes:
      - ./:/app
    ports:
      - "${NGINX_PORT_TWO}:${NGINX_PORT}"
    depends_on:
      - php
    networks:
      - company-onibus

  mysql:
    image: mysql:8
    container_name: company-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - company-onibus

  redis:
    image: redis:alpine
    container_name: company-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - company-onibus

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: company-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
    networks:
      - company-onibus

  npm:
    image: node:20-alpine
    container_name: company-npm
    working_dir: /app
    volumes:
      - ./:/app
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - company-onibus

  mailhog:
    image: mailhog/mailhog:latest
    container_name: company-mailhog
    ports:
      - "${FORWARD_MAILHOG_PORT}:1025"
      - "${FORWARD_MAILHOG_DASHBOARD_PORT}:8025"
    networks:
      - company-onibus

  portainer:
    image: portainer/portainer-ce:latest
    container_name: company-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT}:${PORTAINER_PORT_TWO}"
    environment:
      TZ: ${TIME_ZONE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - company-onibus

networks:
  company-onibus:
    driver: bridge

volumes:
  mysql_data:
  portainer_data:
